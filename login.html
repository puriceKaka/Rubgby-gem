<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rugby Gem | Login</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <main class="auth-page">
    <form id="loginForm" class="auth-card" novalidate>
      <div class="auth-brand">
        <img src="logo/logoInage.jpeg" alt="Rugby Gem Logo" class="auth-logo">
      </div>
      <h1>Rugby Gem</h1>
      <p class="subtitle">Login to your account</p>

      <label class="field" for="loginUsername">
        <span>Username</span>
        <div class="input-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="loginUsername" name="username" placeholder="Username" required>
        </div>
      </label>

      <label class="field" for="loginPassword">
        <span>Password</span>
        <div class="input-wrap">
          <i class="fa-solid fa-key"></i>
          <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
        </div>
      </label>

      <label class="remember">
        <input type="checkbox" id="rememberMe">
        <span>Remember me</span>
      </label>

      <button type="submit" class="btn">Login</button>
      <p id="loginMessage" class="message" aria-live="polite"></p>

      <p class="switch-link">No account yet? <a href="register.html">Create one</a></p>
    </form>
  </main>

  <script src="login.js"></script>
</body>
</html>
